<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">

<title>Fylo Storage</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">


<div class="left-card">

<img class="logo" src="images/logo.svg">

<div class="icons">

<div class="icon-box">
<img src="images/icon-document.svg">
</div>

<div class="icon-box">
<img src="images/icon-folder.svg">
</div>

<div class="icon-box">
<img src="images/icon-upload.svg">
</div>

</div>

</div>



<div class="right-card">

<p>You’ve used <strong>815 GB</strong> of your storage</p>

<div class="progress-bar">

<div class="progress">
<div class="dot"></div>
</div>

</div>

<div class="range">
<span>0 GB</span>
<span>1000 GB</span>
</div>

<div class="left-storage">
<span class="big">185</span>
<span class="small">GB LEFT</span>
</div>

</div>

</div>

</body>
</html>
